5838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">front</text><text data-type="text" data-label="right" data-x="-18" data-y="15.5" x="252.3489932885906" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">right</text><text data-type="text" data-label="back" data-x="20.5" data-y="15.5" x="397.04697986577185" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">back</text><text data-type="text" data-label="left" data-x="59" data-y="15.5" x="541.744966442953" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">left</text><text data-type="text" data-label="front" data-x="-56.5" data-y="15.5" x="107.6510067114094" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">front</text><text data-type="text" data-label="right" data-x="-18" data-y="15.5" x="252.3489932885906" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">right</text><text data-type="text" data-label="back" data-x="20.5" data-y="15.5" x="397.04697986577185" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">back</text><text data-type="text" data-label="left" data-x="59" data-y="15.5" x="541.744966442953" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">left</text><text data-type="text" data-label="front" data-x="-56.5" data-y="15.5" x="107.6510067114094" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">front</text><text data-type="text" data-label="right" data-x="-18" data-y="15.5" x="252.3489932885906" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">right</text><text data-type="text" data-label="back" data-x="20.5" data-y="15.5" x="397.04697986577185" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">back</text><text data-type="text" data-label="left" data-x="59" data-y="15.5" x="541.744966442953" y="223.2214765100671" fill="#1e3a8a" font-size="5.6375838926174495" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">left</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="640" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="640" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '640');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '640');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":3.7583892617449663,"c":0,"e":320,"b":0,"d":-3.7583892617449663,"f":281.4765100671141};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>